<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Glitch - 8-Bit Coding</title>
    <!-- Pixelated Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <!-- VCR OSD Mono for small text -->
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                retro: {
                  red: '#ff0000',
                  blue: '#0000ff',
                  yellow: '#ffff00',
                  brick: '#8b4513',
                  black: '#000000',
                  white: '#ffffff',
                  sky: '#5c94fc',
                  terminal: '#1a1a1a',
                  'terminal-green': '#00ff41'
                }
              },
              fontFamily: {
                sans: ['"VCR OSD Mono"', '"VT323"', 'system-ui'],
                pixel: ['"Press Start 2P"', 'cursive'],
                vcr: ['"VCR OSD Mono"', 'monospace'],
                mono: ['"VT323"', 'monospace']
              },
              borderWidth: {
                '4': '4px',
                '8': '8px',
              },
              keyframes: {
                shake: {
                  '0%, 100%': { transform: 'translateX(0)' },
                  '25%': { transform: 'translateX(-5px)' },
                  '75%': { transform: 'translateX(5px)' },
                }
              },
              animation: {
                shake: 'shake 0.2s ease-in-out 0s 2',
              }
            }
          }
        }
    </script>
    <style>
        /* Plain Light Blue Background - Mario Sky */
        html, body {
            height: 100%;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            background-color: #5c94fc; 
        }

        body {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .mario-ground {
            height: 64px;
            width: 100%;
            background-image: url('/bricks.jpg');
            background-repeat: repeat; 
            background-size: 64px 64px; 
            image-rendering: pixelated;
            border-top: 4px solid #000000;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .mario-ground.hidden {
            display: none;
        }

        img {
            image-rendering: pixelated;
        }
        
        /* Force robot cursor on everything with multiple formats */
        html, body, div, span, p, h1, h2, h3, h4, h5, h6, 
        button, a, input, select, textarea, [role="button"], 
        .retro-button, *:hover, *:active, *:focus {
            cursor: url('/robo-hand.cur'), auto !important;
        }
        
        /* Ensure interactive elements use pointer cursor */
        button, a, input, select, textarea, [role="button"], 
        .retro-button, [onclick], [role="button"]:hover {
            cursor: url('/robo-hand.cur'), pointer !important;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffffff;
            border: 2px solid #000000;
        }
        
        .strikethrough-pixel {
            text-decoration: line-through;
            text-decoration-color: #ff0000;
            text-decoration-thickness: 2px;
        }

        /* Custom Slider Styles */
        .slider {
            -webkit-appearance: none;
            appearance: none;
            height: 12px;
            border-radius: 0;
            outline: none;
            border: 3px solid #000000;
            box-shadow: 3px 3px 0px 0px rgba(0,0,0,0.2);
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 0;
            background: #f19121;
            cursor: pointer;
            border: 3px solid #000000;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.3);
            image-rendering: pixelated;
        }

        .slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 0;
            background: #f19121;
            cursor: pointer;
            border: 3px solid #000000;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.3);
            image-rendering: pixelated;
        }

        .slider::-webkit-slider-thumb:hover {
            background: #ffaa33;
            transform: translateY(-1px);
            box-shadow: 3px 3px 0px 0px rgba(0,0,0,0.3);
        }

        .slider::-moz-range-thumb:hover {
            background: #ffaa33;
            transform: translateY(-1px);
            box-shadow: 3px 3px 0px 0px rgba(0,0,0,0.3);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<script type="module" src="/index.tsx"></script>
</head>
<body class="font-sans" style="cursor: url('/robo-hand.cur'), auto !important;">
    <div id="root" class="flex flex-col h-full w-full relative z-10"></div>
    <div id="main-mario-ground" class="mario-ground"></div>
    
    <script>
        // Force robot cursor on all elements
        function forceRobotCursor() {
            const cursorStyle = 'url("/robo-hand.cur"), auto';
            const pointerStyle = 'url("/robo-hand.cur"), pointer';
            
            // Apply to all elements
            document.querySelectorAll('*').forEach(el => {
                el.style.setProperty('cursor', cursorStyle, 'important');
            });
            
            // Apply pointer to interactive elements
            document.querySelectorAll('button, a, input, select, textarea, [role="button"], .retro-button').forEach(el => {
                el.style.setProperty('cursor', pointerStyle, 'important');
            });
        }
        
        // Apply cursor immediately
        forceRobotCursor();
        
        // Apply cursor when DOM changes
        const observer = new MutationObserver(() => {
            forceRobotCursor();
        });
        
        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
        
        // Apply cursor periodically to ensure consistency
        setInterval(forceRobotCursor, 1000);
    </script>
    
<script type="module" src="/index.tsx"></script>
</body>
</html>
